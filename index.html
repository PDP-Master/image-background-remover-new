<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 背景去除</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }
    .upload-area {
      border: 3px dashed #ddd;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover {
      border-color: #667eea;
      background: #f8f9ff;
    }
    .upload-area.dragover {
      border-color: #667eea;
      background: #f0f3ff;
    }
    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .upload-text {
      color: #666;
      font-size: 16px;
    }
    .upload-text span {
      color: #667eea;
      font-weight: 600;
    }
    input[type="file"] {
      display: none;
    }
    .preview-section {
      display: none;
      gap: 20px;
      margin-bottom: 20px;
    }
    .preview-section.show {
      display: flex;
    }
    .preview-box {
      flex: 1;
      text-align: center;
    }
    .preview-box h3 {
      margin-bottom: 10px;
      color: #333;
    }
    .preview-box img {
      max-width: 100%;
      border-radius: 10px;
      border: 2px solid #eee;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn.loading {
      position: relative;
    }
    .btn.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }
    .status {
      text-align: center;
      margin-top: 15px;
      color: #666;
    }
    .error {
      color: #e74c3c;
    }
    .success {
      color: #27ae60;
    }
    .tips {
      margin-top: 30px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ AI 背景去除</h1>
    <p class="subtitle">上传图片，自动去除背景</p>
    
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <p class="upload-text">点击或拖拽图片到这里<br>或 <span>浏览文件</span></p>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview-section" id="previewSection">
      <div class="preview-box">
        <h3>原图</h3>
        <img id="originalImg" src="" alt="原图">
      </div>
      <div class="preview-box">
        <h3>结果</h3>
        <img id="resultImg" src="" alt="结果">
      </div>
    </div>

    <button class="btn" id="processBtn" disabled>开始处理</button>
    <p class="status" id="status"></p>

    <div class="tips">
      💡 支持 PNG、JPG、WebP 等常见格式<br>
      🎯 最佳效果：主体清晰、背景简单
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewSection = document.getElementById('previewSection');
    const originalImg = document.getElementById('originalImg');
    const resultImg = document.getElementById('resultImg');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let selectedFile = null;

    // 点击上传
    uploadArea.addEventListener('click', () => fileInput.click());

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showStatus('请选择图片文件', 'error');
        return;
      }
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        originalImg.src = e.target.result;
        resultImg.src = '';
        previewSection.classList.add('show');
        processBtn.disabled = false;
        showStatus('图片已加载，点击"开始处理"', '');
      };
      reader.readAsDataURL(file);
    }

    processBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      
      processBtn.disabled = true;
      processBtn.classList.add('loading');
      processBtn.textContent = '处理中...';
      showStatus('正在去除背景，请稍候...', '');

      try {
        // 转换为 base64
        const base64 = await fileToBase64(selectedFile);
        
        // 调用 Cloudflare Worker API
        const response = await fetch('/api/remove-bg', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64 })
        });

        if (!response.ok) {
          throw new Error('处理失败');
        }

        const data = await response.json();
        
        if (data.result) {
          resultImg.src = data.result;
          showStatus('✅ 处理完成！点击图片可保存', 'success');
        } else {
          throw new Error(data.error || '处理失败');
        }
      } catch (err) {
        showStatus('❌ ' + err.message, 'error');
      } finally {
        processBtn.disabled = false;
        processBtn.classList.remove('loading');
        processBtn.textContent = '开始处理';
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status ' + type;
    }
  </script>
</body>
</html>
